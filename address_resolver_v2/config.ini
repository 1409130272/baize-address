# ============================================
# 地址解析服务 - 项目配置文件
# ============================================

# ---- AI 模型配置 ----
[ai]
# 是否启用 AI 兜底功能（总开关，false 时即使 useAI=1 也不会调用 AI）
enabled = true
# DeepSeek API 密钥（也可通过环境变量 DEEPSEEK_API_KEY 设置，环境变量优先级更高）
api_key = 
# API 基础地址
base_url = https://api.deepseek.com
# 模型名称（deepseek-v4-flash 快速高效 | deepseek-v4-pro 更强推理）
model = deepseek-v4-flash
# 是否开启思考模式（thinking）
#   - false（默认，推荐）：关闭思考模式。响应快、兼容 instructor 结构化输出，地址解析推荐。
#   - true：开启思考模式。仅 deepseek-v4-pro / deepseek-v4-flash 在思考模式下生效；
#     注意：思考模式与 instructor 的 tool_choice 不兼容，开启后结构化输出会报 400 错误，
#     除非改造为非 instructor 的解析方式，否则请保持 false。
thinking_enabled = false
# API 超时时间（秒）
timeout = 30
# 生成温度（越低越稳定，0-2）
temperature = 0.1
# API 调用失败重试次数
max_retries = 2

# ---- AI 触发判定 ----
# 规则引擎产出候选结果后，是否调用 AI 兜底由下面三个条件共同决定，
# 三者为「或」关系——任意一条满足即触发 AI，全部不满足才不触发：
#   1) need_ai_review 标志命中（规则引擎内部判定该候选不可靠，强制走 AI）
#      触发场景：地址缺少区县、行政区划匹配异常、关键层级缺失等。
#      此标志由规则引擎在打分阶段自动设置，不受下面两个阈值影响。
#   2) 置信度阈值：候选结果中置信度最高的一条 <= confidence_threshold 时触发。
#      即便只有一个结果，只要分数低于阈值也会触发 AI。
#   3) 歧义判定：前两条候选置信度差值 < ambiguity_gap 时触发（差值越小越歧义）。
#      仅当候选数 >= 2 时才参与判定，单候选不影响。
# 另：useAI=0 或 [ai] enabled=false 时整体不走 AI，与下列阈值无关。
[ai_trigger]
# 置信度阈值：最高候选置信度 <= 此值时触发 AI（条件 2）
confidence_threshold = 75
# 歧义差值阈值：top1 - top2 置信度 < 此值时触发 AI（条件 3，仅候选数 >= 2 时生效）
ambiguity_gap = 10
# AI 候选结果的最低置信度下限：AI 返回的候选置信度会被强制提升到此值，
# 避免低质量 AI 结果在排序中被规则候选压过；不影响是否触发 AI 的判定
min_confidence = 60

# ---- AI 缓存配置 ----
[ai_cache]
# 是否启用 AI 结果缓存
enabled = true
# 缓存最大条目数
maxsize = 10000
# 缓存过期时间（秒），默认 86400 = 1天
ttl = 86400

# ---- AI 费用配置 ----
# 单位：人民币元 / 百万 tokens
# 仅当本次请求实际调用了 AI API（非本地缓存命中）时才计算费用
#
# DeepSeek V4 正式版起引入峰谷定价机制，分平时 / 高峰时段两档单价：
#   高峰时段：每日 9:00～12:00 和 14:00～18:00（北京时间）
#   其余时段按平时单价计费
#
# 官方定价参考（人民币元 / 百万 tokens）：
#   deepseek-v4-flash
#       计费项                 平时    高峰
#       输入（缓存命中）        0.02    0.04
#       输入（缓存未命中）      1.0     2.0
#       输出                   2.0     4.0
#   deepseek-v4-pro
#       计费项                 平时    高峰
#       输入（缓存命中）        0.025   0.05
#       输入（缓存未命中）      3.0     6.0
#       输出                   6.0     12.0
# 当前默认填入 deepseek-v4-flash 的定价，如切换 model 请同步修改下列单价。
[ai_cost]
# 高峰时段定义（北京时间，24小时制，左闭右开）。
# 多个时段用分号分隔，每个时段格式 "HH:MM-HH:MM"。
# 留空或注释此项则不区分峰谷，统一按平时单价计费。
peak_hours = 09:00-12:00;14:00-18:00

# ---- 平时单价 ----
# 百万tokens输入（缓存命中）单价
price_input_cache_hit = 0.02
# 百万tokens输入（缓存未命中）单价
price_input_cache_miss = 1.0
# 百万tokens输出单价
price_output = 2.0

# ---- 高峰时段单价 ----
# 若 peak_hours 为空或解析失败，下列高峰单价不会生效。
# 百万tokens输入（缓存命中）高峰单价
price_peak_input_cache_hit = 0.04
# 百万tokens输入（缓存未命中）高峰单价
price_peak_input_cache_miss = 2.0
# 百万tokens输出高峰单价
price_peak_output = 4.0

# ---- 服务配置 ----
[server]
# 返回候选结果最大数量
max_candidates = 3
# 服务监听地址
host = 0.0.0.0
# 服务监听端口
port = 8769
